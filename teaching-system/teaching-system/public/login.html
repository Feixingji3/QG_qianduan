<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学管理系统 - 登录</title>
    <style>
        /* CSS 变量 */
        :root {
            --primary-color: #1890ff;
            --primary-hover: #40a9ff;
            --error-color: #ff4d4f;
            --bg-color: #f0f2f5;
            --card-bg: #fff;
            --text-primary: #262626;
            --text-secondary: #8c8c8c;
            --border-color: #d9d9d9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .tip {
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }

        .tip.error {
            background: #fff2f0;
            color: var(--error-color);
            border: 1px solid #ffccc7;
        }

        .tip.success {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        .login-btn {
            width: 100%;
            height: 40px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: var(--primary-hover);
        }

        .login-btn:disabled {
            background: #bfbfbf;
            cursor: not-allowed;
        }

        /* 响应式 */
        @media (max-width: 576px) {
            .login-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>教学管理系统</h1>
                <p>请登录您的账号</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="请输入用户名"
                        autocomplete="username"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="请输入密码"
                        autocomplete="current-password"
                    >
                </div>
                
                <div id="tip" class="tip"></div>
                
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
            </form>
        </div>
    </div>

    <!-- 认证模块 -->
    <script src="auth.js"></script>
    <!-- API 工具模块 -->
    <script src="js/utils/api.js"></script>
    
    <script>
        const form = document.getElementById('loginForm');
        const tip = document.getElementById('tip');
        const loginBtn = document.getElementById('loginBtn');

        // 如果已登录，直接跳转首页
        if (Auth.isLogin()) {
            window.location.href = '/index.html';
        }

        // 登录提交
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // 简单校验
            if (!username || !password) {
                tip.className = 'tip error';
                tip.innerText = '请输入用户名和密码';
                tip.style.display = 'block';
                return;
            }

            // 禁用按钮
            loginBtn.disabled = true;
            loginBtn.innerText = '登录中...';

            try {
                // 使用 API 工具调用登录接口
                const data = await API.post('/auth/login', { username, password });
                
                if (data.data && data.data.token) {
                    // 保存登录态（JWT Token）
                    Auth.save(data.data.token, data.data.userInfo);
                    
                    tip.className = 'tip success';
                    tip.innerText = '登录成功，正在跳转...';
                    tip.style.display = 'block';
                    
                    // 跳首页
                    setTimeout(() => window.location.href = '/index.html', 800);
                } else {
                    tip.className = 'tip error';
                    tip.innerText = data.message || '登录失败';
                    tip.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerText = '登 录';
                }
            } catch (err) {
                console.error('登录错误:', err);
                tip.className = 'tip error';
                tip.innerText = err.message || '网络错误，请检查后端服务是否启动';
                tip.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerText = '登 录';
            }
        };
    </script>
</body>
</html>
